				<span class="hamburger-line dark:bg-primary"></span>

			<nav
				id="navbar"
				x-data="{
				active: 'home',
				setActive(id) {
					this.active = id;
				}
				}"
				x-init="
				const observer = new IntersectionObserver((entries) => {
					entries.forEach(entry => {
					if (entry.isIntersecting) {
						active = entry.target.id;
					}
					});
				}, { threshold: 0.6 });

				document.querySelectorAll('section').forEach(section => {
					observer.observe(section);
				});
				"
				class="flex flex-row py-6 invisible w-xs lg:w-2xl lg:visible lg:py-3 px-9 justify-center mt-0 lg:mt-5 bg-hvPrimary/50 dark:bg-dark/50 backdrop-blur-sm rounded-2xl lg:rounded-full fixed top-16 lg:top-0 right-6 lg:left-1/2 lg:-translate-x-1/2 shadow-lg shadow-dark/20 z-50 transition-all duration-300"

						<a href="#home" @click="setActive('home')" :class="active === 'home' ? 'opacity-100' : 'opacity-40'" x-text="$store.lang.t('nav_home')"></a>
						<a href="#about" @click="setActive('about')" :class="active === 'about' ? 'opacity-100' : 'opacity-40'" x-text="$store.lang.t('nav_about')"></a>
